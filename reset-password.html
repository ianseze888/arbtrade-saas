<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARBTRADE — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a08;--bg2:#161719;--bg3:#1e2023;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f2efe8;--muted:#888884;--gold:#c8a96e;--gold2:#e8c98a;--red:#FF5C5C;--green:#3ECFA0;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,169,110,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,110,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.logo{font-size:13px;font-family:var(--mono);color:var(--gold);letter-spacing:.15em;margin-bottom:40px;text-align:center}
.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px 40px;position:relative}
.card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.card-sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:28px}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
input{width:100%;font-size:13px;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text);font-family:var(--sans);outline:none;transition:border .15s}
input:focus{border-color:var(--gold)}
.btn-submit{width:100%;padding:11px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px}
.btn-submit:hover{background:var(--gold2)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:12px;font-family:var(--mono);padding:10px 12px;border-radius:8px;margin-top:12px;display:none}
.msg.error{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.2);color:var(--red)}
.msg.success{background:rgba(62,207,160,.08);border:1px solid rgba(62,207,160,.2);color:var(--green)}
.msg.show{display:block}
.footer-link{text-align:center;margin-top:20px;font-size:12px;color:var(--muted);font-family:var(--mono)}
.footer-link a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="logo">ARBTRADE — Research Hub</div>
<div class="card">
  <div class="card-title">Set new password</div>
  <div class="card-sub">Enter your new password below</div>
  <div class="field">
    <label>New password</label>
    <input type="password" id="new-password" placeholder="Min 8 characters" autocomplete="new-password">
  </div>
  <div class="field">
    <label>Confirm password</label>
    <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password">
  </div>
  <button class="btn-submit" onclick="handleReset()" id="reset-btn">Update password →</button>
  <div class="msg" id="reset-msg"></div>
</div>
<div class="footer-link"><a href="login.html">← Back to sign in</a></div>

<script>
var API = 'https://arbtrade-saas-production.up.railway.app';

function showMsg(text, type) {
  var el = document.getElementById('reset-msg');
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}

async function handleReset() {
  var password = document.getElementById('new-password').value;
  var confirm  = document.getElementById('confirm-password').value;
  if(!password || password.length < 8) { showMsg('Password must be at least 8 characters','error'); return; }
  if(password !== confirm) { showMsg('Passwords do not match','error'); return; }

  var btn = document.getElementById('reset-btn');
  btn.disabled = true; btn.textContent = 'Updating...';

  try {
    // Get access token from URL hash (Supabase puts it there)
    var hash = window.location.hash;
    var params = new URLSearchParams(hash.replace('#',''));
    var accessToken = params.get('access_token');

    if(!accessToken) {
      showMsg('Invalid or expired reset link. Please request a new one.','error');
      btn.disabled = false; btn.textContent = 'Update password →';
      return;
    }

    var resp = await fetch(API+'/auth/update-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: password, access_token: accessToken})
    });

    var data = await resp.json();
    showMsg('Password updated! Redirecting to login...','success');
    setTimeout(function(){ window.location.href = 'login.html'; }, 2000);
  } catch(e) {
    showMsg('Error updating password. Please try again.','error');
    btn.disabled = false; btn.textContent = 'Update password →';
  }
}
</script>
</body>
</html>
